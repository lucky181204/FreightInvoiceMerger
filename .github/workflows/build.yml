name: Build FreightInvoiceMerger.exe

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          pip install -r FreightInvoiceMerger/requirements.txt
          pip install pyinstaller

      - name: Build executable
        working-directory: ${{ github.workspace }}\FreightInvoiceMerger
        run: python build.py

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreightInvoiceMerger
          path: ${{ github.workspace }}\FreightInvoiceMerger\dist\FreightInvoiceMerger.exe
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}\FreightInvoiceMerger\dist\FreightInvoiceMerger.exe
          generate_release_notes: true
